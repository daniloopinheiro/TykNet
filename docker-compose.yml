services:
  # Product API
  product-api:
    build:
      context: .
      dockerfile: src/ProductApi/Dockerfile
    container_name: tyknet-product-api
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    networks:
      - tyknet-network
    healthcheck:
      test: ["CMD", "dotnet", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # User API
  user-api:
    build:
      context: .
      dockerfile: src/UserApi/Dockerfile
    container_name: tyknet-user-api
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    networks:
      - tyknet-network
    healthcheck:
      test: ["CMD", "dotnet", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Order API
  order-api:
    build:
      context: .
      dockerfile: src/OrderApi/Dockerfile
    container_name: tyknet-order-api
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    networks:
      - tyknet-network
    healthcheck:
      test: ["CMD", "dotnet", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis
  redis:
    image: bitnami/redis:latest
    container_name: tyknet-redis
    ports:
      - "6379:6379"
    networks:
      - tyknet-network
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Tyk Gateway
  tyk-gateway:
    image: tykio/tyk-gateway:v5.3.0
    container_name: tyknet-gateway
    ports:
      - "8181:8181"
    volumes:
      - ./tyk/tyk.conf:/opt/tyk-gateway/tyk.conf
      - ./tyk/apps:/opt/tyk-gateway/apps
    networks:
      - tyknet-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    # depends_on:
    #   - product-api
    #   - user-api
    #   - order-api

networks:
  tyknet-network:
    driver: bridge
