name: CI - Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  detect-and-build:
    runs-on: ubuntu-latest    
    steps:
      # .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
        if: hashFiles('**/*.csproj', '**/*.sln') != ''
        
      - name: Restaurar dependências .NET
        if: hashFiles('**/*.csproj', '**/*.sln') != ''
        run: dotnet restore

      - name: Build .NET
        if: hashFiles('**/*.csproj', '**/*.sln') != ''
        run: dotnet build --configuration Release --no-restore

      - name: Testes .NET
        if: hashFiles('**/*.csproj', '**/*.sln') != ''
        continue-on-error: true
        run: dotnet test --configuration Release --no-build --verbosity normal

      # DOCKER (se existir Dockerfile)
      - name: Build Docker Image
        if: hashFiles('**/Dockerfile') != ''
        run: |
          docker build -t app:${{ github.sha }} .

      - name: Upload artefatos
        uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: build-artifacts-${{ matrix.node-version }}
          path: |
            dist/
            build/
            target/
            out/
            bin/
          retention-days: 5

  security-scan:
    runs-on: ubuntu-latest
    needs: detect-and-build
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Executar Trivy security scanner
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: 'trivy-results.sarif'

  code-quality:
    runs-on: ubuntu-latest
    needs: detect-and-build
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        if: env.SONAR_TOKEN != ''

  notify:
    runs-on: ubuntu-latest
    needs: [detect-and-build, security-scan, code-quality]
    if: always()
    
    steps:
      - name: Status da pipeline
        run: |
          echo "Pipeline concluída!"
          echo "Status: ${{ needs.detect-and-build.result }}"

